[env:esp32dev]
platform  = espressif32@6.9.0
board     = esp32-s3-devkitc-1
framework = arduino
upload_speed = 115200
monitor_speed = 115200
build_flags = -D ARDUINO_USB_CDC_ON_BOOT=1 -D NO_FPGA
upload_port = /dev/ttyACM2
lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.10

[env:test]
platform  = espressif32@6.9.0
board     = esp32-s3-devkitc-1
framework = arduino
upload_speed = 115200
monitor_speed = 115200
build_flags = -D ARDUINO_USB_CDC_ON_BOOT=1
build_src_filter = -<main.cpp> -<testbench.cpp> +<test.cpp>

lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.10

[env:testbench]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino
upload_speed = 115200
build_flags = -D TESTBENCH_BUILD
build_src_filter = -<main.cpp> +<testbench.cpp>

lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.10
